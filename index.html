  {label:"P'", name:"Plan P Prime", oldName:"Old P Optimum",   color:"#c084fc", offset:3},

const SB = ["rgba(30,58,95,.55)","rgba(74,28,64,.55)","rgba(20,53,42,.55)","rgba(61,37,0,.55)"];

const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, isNaN(v)?lo:v));
const sgd   = v => "S$"+Math.abs(v).toLocaleString("en-SG",{minimumFractionDigits:2,maximumFractionDigits:2});
const mono  = {fontFamily:"'Roboto Mono',monospace"};

function App() {
  const [mode,  setMode]  = React.useState("single");
  const [slots, setSlots] = React.useState([
    {plan:0, age:35, from:30, to:65},
  ]);

  const upd     = (i,k,v) => setSlots(s => s.map((sl,j) => j===i ? {...sl,[k]:v} : sl));
  const addSlot = () => slots.length < 4 && setSlots(s => [...s, {plan:1, age:40, from:30, to:65}]);
  const delSlot = (i) => slots.length > 1 && setSlots(s => s.filter((_,j) => j!==i));

  const res = React.useMemo(() => slots.map((sl,i) => {
    const p = PLANS[sl.plan], c = SC[i];
    if (mode === "single") {
      const a = clamp(sl.age,1,100), r = DATA[a]; if (!r) return null;
      const nw=r[p.offset], oe=r[p.offset+1], oc=r[p.offset+2], diff=oe-nw;
      return {mode:"single", nw, oe, oc, diff, pct:oe>0?diff/oe*100:0, p, c, i, age:a};
    } else {
      const lo=clamp(Math.min(sl.from,sl.to),1,100), hi=clamp(Math.max(sl.from,sl.to),1,100);
      let tN=0, tE=0, tC=0;
      for (let a=lo; a<=hi; a++) { const r=DATA[a]; if(r){tN+=r[p.offset];tE+=r[p.offset+1];tC+=r[p.offset+2];} }
      const diff=tE-tN;
      return {mode:"range", tN, tE, tC, diff, pct:tE>0?diff/tE*100:0, yrs:hi-lo+1, lo, hi, p, c, i};
    }
  }), [slots, mode]);

  const valid     = res.filter(Boolean);
  const globalMax = Math.max(...valid.flatMap(r => mode==="single"?[r.nw,r.oe]:[r.tN,r.tE]), 1);

  return (
    <div style={{minHeight:"100vh"}}>
      {/* HEADER */}
      <div style={{background:"linear-gradient(160deg,#0c1829,#070f1d)",borderBottom:"1px solid #0f1e35",padding:"15px 18px 13px"}}>

        <h1 style={{fontSize:"18px",fontWeight:700,color:"#e2e8f0",letterSpacing:"-0.3px"}}>Hospital Plan Premium Comparison</h1>
        <p style={{fontSize:"11px",color:"#1e3a5f",marginTop:"3px"}}>Mix any plan + any age · New vs Old Plan (Eff. 1-Nov-2025) · Up to 4 slots</p>
      </div>

      <div style={{padding:"16px 18px",maxWidth:"820px",margin:"0 auto"}}>

        {/* MODE TOGGLE */}
        <div style={{display:"flex",marginBottom:"18px",background:"#0b1829",borderRadius:"10px",padding:"4px",border:"1px solid #0f1e35",width:"fit-content"}}>
          {[["single","📌 Single Age"],["range","📊 Age Range"]].map(([m,lbl]) => (

              padding:"7px 16px",borderRadius:"7px",border:"none",
              fontWeight:600,fontSize:"13px",fontFamily:"inherit",
              background:mode===m?"#1d4ed8":"transparent",
              color:mode===m?"#fff":"#3d5a80",
            }}>{lbl}</button>
          ))}
        </div>

        {/* SLOTS */}
        <div style={{marginBottom:"20px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
            <span style={{fontSize:"9px",letterSpacing:"2px",color:"#1e3a5f",fontWeight:700}}>COMPARISON SLOTS</span>
            {slots.length < 4 &&
              <button className="hov" onClick={addSlot} style={{
                padding:"5px 12px",borderRadius:"8px",border:"1px dashed #1e3a5f",
                background:"transparent",color:"#3b82f6",
                fontSize:"12px",fontWeight:700,fontFamily:"inherit",
              }}>+ Add Slot</button>
            }
          </div>
          <div style={{display:"grid",gridTemplateColumns:`repeat(${slots.length},1fr)`,gap:"10px"}}>
            {slots.map((sl,i) => (
              <SlotCard key={i} idx={i} sl={sl} mode={mode}
                color={SC[i]} bg={SB[i]}
                onChange={(k,v)=>upd(i,k,v)}
                onDel={()=>delSlot(i)}
                canDel={slots.length>1}
              />
            ))}
          </div>
        </div>

        {/* COMPARISON TABLE */}
        {valid.length > 0 && <CompTable res={res} mode={mode} />}

        {/* VISUAL BARS */}
        {valid.length > 0 && (
          <div style={{background:"#0b1829",borderRadius:"14px",border:"1px solid #0f1e35",padding:"16px",marginBottom:"14px"}}>
            <div style={{fontSize:"9px",letterSpacing:"2px",color:"#1e3a5f",fontWeight:700,marginBottom:"14px"}}>VISUAL COMPARISON</div>
            {res.map((r,i) => {
              if (!r) return null;
              const nAmt=mode==="single"?r.nw:r.tN, oAmt=mode==="single"?r.oe:r.tE;
              const lbl=mode==="single"?`Slot ${i+1} · ${r.p.name} · Age ${r.age}`:`Slot ${i+1} · ${r.p.name} · Age ${r.lo}–${r.hi}`;
              return (
                <div key={i} style={{marginBottom:i<res.length-1?"16px":0}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                      <div style={{width:"8px",height:"8px",borderRadius:"50%",background:SC[i],boxShadow:`0 0 6px ${SC[i]}80`}}/>
                      <span style={{fontSize:"11px",color:"#64748b"}}>{lbl}</span>
                    </div>
                    <span style={{...mono,fontSize:"11px",fontWeight:700,color:r.diff>0?"#22c55e":"#f87171"}}>
                      {r.diff>0?"-":"+"}S${Math.abs(r.diff).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,",")} ({Math.abs(r.pct).toFixed(1)}%)
                    </span>
                  </div>
                  <Bar label="New" value={nAmt} max={globalMax} color={SC[i]} />
                  <Bar label="Old" value={oAmt} max={globalMax} color="#ef4444" faded={true} />
                </div>
              );
            })}
          </div>
        )}

        {/* FOOTNOTE */}
        <div style={{padding:"11px 14px",background:"#0b1829",borderRadius:"10px",border:"1px solid #0f1e35"}}>
          <p style={{fontSize:"10px",color:"#1e3a5f",lineHeight:"1.7"}}>
            ★ = lowest new premium among slots. Ages 76+ exceed standard bands. Plan P' compared vs Old P Optimum (renewals only). All premiums SGD annual, ANB basis.
          </p>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════ SLOT CARD ════════════════════════════════════ */
function SlotCard({idx, sl, mode, color, bg, onChange, onDel, canDel}) {
  return (
    <div style={{background:bg,borderRadius:"13px",border:`1.5px solid ${color}45`,padding:"13px 11px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"5px"}}>
          <div style={{width:"9px",height:"9px",borderRadius:"50%",background:color,boxShadow:`0 0 8px ${color}80`}}/>
          <span style={{fontSize:"9px",letterSpacing:"1.5px",color,fontWeight:700}}>SLOT {idx+1}</span>
        </div>
        {canDel && <button className="hov" onClick={onDel} style={{background:"transparent",border:"none",color:"#2d4a6e",fontSize:"18px",lineHeight:1,padding:"0 2px"}}>×</button>}
      </div>

      <div style={{fontSize:"9px",letterSpacing:"1.2px",color:"#1e3a5f",fontWeight:700,marginBottom:"6px"}}>PLAN</div>
      <div style={{display:"flex",gap:"4px",marginBottom:"12px",flexWrap:"wrap"}}>
        {PLANS.map((p,pi) => (
          <button key={pi} className="hov" onClick={()=>onChange("plan",pi)} style={{
            padding:"4px 8px",borderRadius:"6px",
            border:`1px solid ${sl.plan===pi?p.color:"#1a2a42"}`,
            background:sl.plan===pi?`${p.color}22`:"transparent",
            color:sl.plan===pi?p.color:"#3d5a80",
            fontSize:"12px",fontWeight:700,fontFamily:"inherit",
          }}>{p.label}</button>
        ))}
      </div>

      {mode === "single" ? (
        <div>
          <div style={{fontSize:"9px",letterSpacing:"1.2px",color:"#1e3a5f",fontWeight:700,marginBottom:"6px"}}>AGE (ANB)</div>
          <div style={{display:"flex",alignItems:"center",gap:"5px",marginBottom:"7px"}}>
            <Btn onClick={()=>onChange("age",Math.max(1,sl.age-1))}>−</Btn>
            <span style={{...mono,fontSize:"26px",fontWeight:700,color,flex:1,textAlign:"center",lineHeight:1}}>{sl.age}</span>
            <Btn onClick={()=>onChange("age",Math.min(100,sl.age+1))}>+</Btn>
          </div>
          <input type="range" min={1} max={100} value={sl.age}
            onChange={e=>onChange("age",+e.target.value)}
            style={{accentColor:color}}
          />
          {sl.age >= 76 && <div style={{fontSize:"10px",color:"#f59e0b",marginTop:"4px"}}>⚠ Age 76+</div>}
        </div>
      ) : (
        <div>
          <div style={{fontSize:"9px",letterSpacing:"1.2px",color:"#1e3a5f",fontWeight:700,marginBottom:"7px"}}>AGE RANGE (ANB)</div>
          <div style={{display:"flex",gap:"5px",alignItems:"flex-end",flexWrap:"wrap"}}>
            <AgeIn label="From" val={sl.from} color={color} set={v=>onChange("from",v)}/>
            <span style={{color:"#1e3a5f",fontSize:"11px",paddingBottom:"3px"}}>→</span>
            <AgeIn label="To"   val={sl.to}   color={color} set={v=>onChange("to",v)}/>
          </div>
          <div style={{...mono,fontSize:"12px",color,fontWeight:700,marginTop:"7px"}}>
            {clamp(Math.max(sl.from,sl.to),1,100) - clamp(Math.min(sl.from,sl.to),1,100) + 1} yrs
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════ TABLE ════════════════════════════════════════ */
function CompTable({res, mode}) {
  const valid    = res.filter(Boolean);
  const newVals  = valid.map(r => mode==="single"?r.nw:r.tN);
  const minNew   = Math.min(...newVals);
  const cols     = res.length;

  const rows = mode === "single"
    ? [
        {lbl:"Plan",           fn:r=>r.p.name,                                         },
        {lbl:"Age",            fn:r=>`${r.age}`,              isMono:true              },
        {lbl:"New Premium",    fn:r=>sgd(r.nw),               isMono:true, isNew:true  },
        {lbl:"Old (Nov-25)",   fn:r=>sgd(r.oe),               isMono:true, isOld:true  },
        {lbl:"Old (Pre-hike)", fn:r=>sgd(r.oc),               isMono:true, dim:true    },
        {lbl:"Annual Savings", fn:r=>sgd(r.diff),             isMono:true, isSav:true  },
        {lbl:"% Diff",         fn:r=>(r.pct>=0?"-":"+")+Math.abs(r.pct).toFixed(1)+"%", isMono:true, isSav:true},
      ]
    : [
        {lbl:"Plan",            fn:r=>r.p.name,                                         },
        {lbl:"Age Range",       fn:r=>`${r.lo}–${r.hi}`,      isMono:true              },
        {lbl:"Years",           fn:r=>`${r.yrs}`,             isMono:true              },
        {lbl:"New Total",       fn:r=>sgd(r.tN),              isMono:true, isNew:true  },
        {lbl:"Old Total",       fn:r=>sgd(r.tE),              isMono:true, isOld:true  },
        {lbl:"Pre-hike Total",  fn:r=>sgd(r.tC),              isMono:true, dim:true    },
        {lbl:"Total Savings",   fn:r=>sgd(r.diff),            isMono:true, isSav:true  },
        {lbl:"% Diff",          fn:r=>(r.pct>=0?"-":"+")+Math.abs(r.pct).toFixed(1)+"%", isMono:true, isSav:true},
      ];

  const gridCols = `120px repeat(${cols},1fr)`;

  return (
    <div style={{background:"#0b1829",borderRadius:"14px",border:"1px solid #0f1e35",overflow:"hidden",marginBottom:"14px"}}>
      {/* Slot header */}
      <div style={{display:"grid",gridTemplateColumns:gridCols,borderBottom:"1px solid #0f1e35",background:"#091220"}}>
        <div style={{padding:"10px 12px"}}/>
        {res.map((r,i) => r && (
          <div key={i} style={{padding:"10px 10px",borderLeft:"1px solid #0f1e35",background:SB[i]}}>
            <div style={{display:"flex",alignItems:"center",gap:"5px",marginBottom:"2px"}}>
              <div style={{width:"7px",height:"7px",borderRadius:"50%",background:SC[i]}}/>
              <span style={{fontSize:"9px",letterSpacing:"1px",color:SC[i],fontWeight:700}}>SLOT {i+1}</span>
            </div>
            <div style={{fontSize:"10px",color:"#3d5a80"}}>{r.p.name}</div>
          </div>
        ))}
      </div>

      {rows.map((row,ri) => (
        <div key={ri} style={{
          display:"grid",gridTemplateColumns:gridCols,
          borderBottom:ri<rows.length-1?"1px solid #091220":"none",
          background:ri%2?"#091220":"transparent",
        }}>
          <div style={{padding:"9px 12px",fontSize:"10px",color:"#2d4a6e",fontWeight:600,display:"flex",alignItems:"center"}}>{row.lbl}</div>
          {res.map((r,i) => {
            if (!r) return <div key={i} style={{borderLeft:"1px solid #091220"}}/>;
            const val = row.fn(r);
            const nv  = mode==="single"?r.nw:r.tN;
            const isLowest = row.isNew && nv===minNew && newVals.length>1;
            const color = row.isSav?(r.diff>0?"#22c55e":"#f87171"):
                          row.isNew?SC[i]: row.isOld?"#ef4444":
                          row.dim?"#334155":"#94a3b8";
            return (
              <div key={i} style={{
                padding:"9px 10px",borderLeft:"1px solid #091220",
                fontFamily:row.isMono?"'Roboto Mono',monospace":"inherit",
                fontSize:row.isNew?"13px":"12px",
                fontWeight:row.isSav||row.isNew?700:500,
                color,display:"flex",alignItems:"center",gap:"4px",
                background:isLowest?"rgba(34,197,94,.07)":"transparent",
              }}>
                {isLowest && <span style={{fontSize:"9px",color:"#22c55e"}}>★</span>}
                {val}
              </div>
            );
          })}
        </div>
      ))}
    </div>
  );
}

/* ═══════════════════════════ SMALL BITS ═══════════════════════════════════ */
function Bar({label,value,max,color,faded}) {
  const pct = (value/max*100).toFixed(1);
  return (
    <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"4px"}}>
      <span style={{fontSize:"10px",color:"#1e3a5f",width:"24px",textAlign:"right"}}>{label}</span>
      <div style={{flex:1,background:"#0f1e35",borderRadius:"4px",height:"11px",overflow:"hidden"}}>
        <div style={{
          width:`${pct}%`,height:"100%",borderRadius:"4px",
          background:faded?`${color}55`:`linear-gradient(90deg,${color},${color}90)`,
          transition:"width .4s cubic-bezier(.4,0,.2,1)",
        }}/>
      </div>
      <span style={{...mono,fontSize:"11px",color:faded?"#334155":color,width:"106px",textAlign:"right"}}>{sgd(value)}</span>
    </div>
  );
}

function Btn({onClick,children}) {
  return (
    <button className="hov" onClick={onClick} style={{
      width:"28px",height:"28px",borderRadius:"6px",border:"1px solid #1a2a42",
      background:"#0f1e35",color:"#3d5a80",fontSize:"16px",
      display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit",
    }}>{children}</button>
  );
}

function AgeIn({label,val,color,set}) {
  return (
    <div>
      <div style={{fontSize:"9px",letterSpacing:"1px",color:"#1e3a5f",fontWeight:700,marginBottom:"4px"}}>{label}</div>
      <div style={{display:"flex",gap:"3px",alignItems:"center"}}>
        <Btn onClick={()=>set(Math.max(1,val-1))}>−</Btn>
        <input type="number" min={1} max={100} value={val}
          onChange={e=>set(clamp(+e.target.value,1,100))}
          style={{
            width:"48px",padding:"4px 2px",borderRadius:"6px",
            border:`1.5px solid ${color}50`,background:"#070f1d",
            color:"#e2e8f0",...mono,fontSize:"17px",fontWeight:700,
            textAlign:"center",outline:"none",
          }}/>
        <Btn onClick={()=>set(Math.min(100,val+1))}>+</Btn>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
